name: Daily Financial Briefing

on:
  schedule:
    - cron: '0 5 * * 1-5'   # 5:00 UTC = 8:00 Riga time, Mon–Fri only
  workflow_dispatch:          # lets you trigger manually from GitHub UI

jobs:
  briefing:
    runs-on: ubuntu-latest

    permissions:
      contents: write         # needed to commit history files back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefing
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID:    ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_SECRET:       ${{ secrets.REDDIT_SECRET }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python briefing.py

      - name: Save history to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add history/
          git diff --staged --quiet || git commit -m "Daily briefing history: $(date +%Y-%m-%d)"
          git push
